<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Viva Admin">

    <style>
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Station Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; -webkit-tap-highlight-color: transparent; }
        input:focus { outline: 2px solid #6366f1; }
    </style>
</head>
<body class="text-slate-100 font-sans pb-20">

    <header class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-700 p-4">
        <h1 class="text-xl font-bold text-center text-indigo-400 uppercase tracking-widest">Admin Control</h1>
    </header>

    <main class="p-4 space-y-6 max-w-md mx-auto">

        <section class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700">
            <h2 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-tighter">Global Settings</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Announcement</label>
                    <input id="inp-announcement" type="text" placeholder="Viva-Voce Session Active"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Sub-comment</label>
                    <input id="inp-global-comments" type="text" placeholder="Please keep IDs ready..."
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white text-sm">
                </div>
                <button onclick="updateGlobal()"
                        class="w-full bg-indigo-600 active:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-indigo-500/20">
                    Update Global Display
                </button>
            </div>
        </section>

        <section class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-amber-400">Station 01</h2>
                <span class="text-[10px] text-green-500 font-mono">CONNECTED</span>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="col-span-2">
                    <label class="block text-[10px] text-slate-500 uppercase">Ongoing Roll</label>
                    <input id="st1-inp-ongoing" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-4 text-2xl font-black text-center">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase text-center">Next</label>
                    <input id="st1-inp-next" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase text-center">Waiting</label>
                    <input id="st1-inp-waiting" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] text-slate-500 uppercase">Get Ready</label>
                    <input id="st1-inp-ready" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] text-slate-500 uppercase">Remarks</label>
                    <input id="st1-inp-remarks" type="text" placeholder="Ready"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-sm">
                </div>
            </div>
            <button onclick="updateStation(1)"
                    class="w-full bg-emerald-600 active:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-500/20">
                Push Station 01 Updates
            </button>
        </section>

        <section class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-amber-400">Station 02</h2>
                <span class="text-[10px] text-green-500 font-mono">CONNECTED</span>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="col-span-2">
                    <label class="block text-[10px] text-slate-500 uppercase">Ongoing Roll</label>
                    <input id="st2-inp-ongoing" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-4 text-2xl font-black text-center">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase text-center">Next</label>
                    <input id="st2-inp-next" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase text-center">Waiting</label>
                    <input id="st2-inp-waiting" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] text-slate-500 uppercase">Get Ready</label>
                    <input id="st2-inp-ready" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] text-slate-500 uppercase">Remarks</label>
                    <input id="st2-inp-remarks" type="text" placeholder="Ready"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-sm">
                </div>
            </div>
            <button onclick="updateStation(2)"
                    class="w-full bg-emerald-600 active:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-500/20">
                Push Station 02 Updates
            </button>
        </section>

        <section class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-amber-400">Station 03</h2>
                <span class="text-[10px] text-green-500 font-mono">CONNECTED</span>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="col-span-2">
                    <label class="block text-[10px] text-slate-500 uppercase">Ongoing Roll</label>
                    <input id="st3-inp-ongoing" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-4 text-2xl font-black text-center">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase text-center">Next</label>
                    <input id="st3-inp-next" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase text-center">Waiting</label>
                    <input id="st3-inp-waiting" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] text-slate-500 uppercase">Get Ready</label>
                    <input id="st3-inp-ready" type="text" inputmode="numeric" placeholder="--"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] text-slate-500 uppercase">Remarks</label>
                    <input id="st3-inp-remarks" type="text" placeholder="Ready"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-sm">
                </div>
            </div>
            <button onclick="updateStation(3)"
                    class="w-full bg-emerald-600 active:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-500/20">
                Push Station 03 Updates
            </button>
        </section>
        <p class="text-center text-slate-600 text-[10px] uppercase tracking-widest pt-4">End of Controls</p>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-700 p-2 flex justify-around text-[10px] text-slate-500">
        <div class="flex flex-col items-center text-indigo-400">
            <span class="text-lg">📱</span>
            <span>Admin</span>
        </div>
        <div class="flex flex-col items-center" onclick="window.location.href='display.html'">
            <span class="text-lg">📺</span>
            <span>View Display</span>
        </div>
    </nav>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAeodb0vREvOcd-683q-E7OWVfRFyvVK7s",
    authDomain: "vivavocemanager.firebaseapp.com",
    databaseURL: "https://vivavocemanager-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "vivavocemanager",
    storageBucket: "vivavocemanager.firebasestorage.app",
    messagingSenderId: "609230399343",
    appId: "1:609230399343:web:1525d72e5ab418cfb6ea9a"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function updateGlobal() {
    db.ref('global').set({
      announcement: document.getElementById('inp-announcement').value,
      comments: document.getElementById('inp-global-comments').value
    });
  }

  function updateStation(id) {
    db.ref('stations/st' + id).set({
      ongoing: document.getElementById(`st${id}-inp-ongoing`).value,
      next: document.getElementById(`st${id}-inp-next`).value,
      waiting: document.getElementById(`st${id}-inp-waiting`).value,
      ready: document.getElementById(`st${id}-inp-ready`).value,
      remarks: document.getElementById(`st${id}-inp-remarks`).value
    }).then(() => alert("Station " + id + " Updated!"));
  }
</script>
</body>
</html>
