<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Viva Admin">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>

    <title>Admin - Station Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; -webkit-tap-highlight-color: transparent; }
        input:focus { outline: 2px solid #6366f1; }
    </style>
</head>
<body class="text-slate-100 font-sans pb-20">
<!-- Line: Immediately after <body> -->
<div id="admin-lock-overlay"
     class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center p-6 text-center">
    <div id="lock-content" class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl max-w-sm w-full">
        <div id="lock-icon" class="text-5xl mb-4">🔒</div>
        <h2 class="text-xl font-bold text-white mb-2">Admin Access Locked</h2>
        <p id="lock-status" class="text-slate-400 text-sm mb-6">Checking authorization...</p>
        <div id="manual-entry" class="mt-4 space-y-3">
            <input id="inp-access-code" type="text" maxlength="6" placeholder="Enter 6-Digit Code"
                   class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 text-center text-xl font-mono tracking-widest text-white focus:border-indigo-500 outline-none">
            <button onclick="verifyManualCode()"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all active:scale-95">
                Join Session
            </button>
        </div>
        <div id="qr-section" class="hidden mt-4">
            <div class="p-4 bg-white rounded-xl inline-block">
                <img id="access-qr" src="" alt="Access QR">
            </div>
            <p id="display-token" class="text-indigo-400 font-mono font-bold mt-2"></p>
            <p class="text-slate-500 text-[10px] uppercase mt-1">Scan to share access</p>
        </div>
    </div>
</div>

<header class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-700 p-4">
    <h1 class="text-xl font-bold text-center text-indigo-400 uppercase tracking-widest">Admin Control</h1>
</header>

<main class="p-4 space-y-6 max-w-md mx-auto">
    <section class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700">
        <h2 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-tighter">Timer Control</h2>
        <div class="flex gap-2">
            <button onclick="startTimer()"
                    class="flex-grow bg-indigo-600 active:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg">
                Start / Reset
            </button>
            <button onclick="stopTimer()"
                    class="px-4 bg-slate-700 text-slate-300 font-bold py-3 rounded-xl">
                Stop
            </button>
            <button onclick="testBell()"
                    class="font-bold text-xs px-6 bg-green-600 rounded-xl py-3 text-white tracking-widest"> 🛎️ Bell
            </button>
        </div>
        <p id="timer-status" class="text-[10px] text-center mt-2 text-slate-500 uppercase">Timer Ready</p>
    </section>

    <section class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700">
        <h2 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-tighter">Global Settings</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-slate-500 mb-1">Announcement</label>
                <input id="inp-announcement" type="text" placeholder="Viva-Voce Session Active"
                       class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white">
            </div>
            <div>
                <label class="block text-xs text-slate-500 mb-1">Sub-comment</label>
                <input id="inp-global-comments" type="text" placeholder="Please keep IDs ready..."
                       class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white text-sm">
            </div>
            <button onclick="updateGlobal()"
                    class="w-full bg-indigo-600 active:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg">
                Update Global Display
            </button>
        </div>
    </section>

    <section class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-amber-400">Station 01</h2>
            <span class="text-[10px] text-green-500 font-mono">CONNECTED</span>
            <input id="st1-start-roll" type="number" value="1"
                   class="w-10 bg-slate-700 text-white text-[10px] rounded p-1 border border-slate-600 text-center">
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="col-span-2">
                <label class="block text-[10px] text-slate-500 uppercase">Ongoing Roll</label>
                <input id="st1-inp-ongoing" type="text" inputmode="text" placeholder="--"
                       class="w-full bg-slate-900 border border-slate-600 rounded-lg p-4 text-2xl font-black text-center">
            </div>
            <input id="st1-inp-next" type="text" inputmode="text" placeholder="Next"
                   class="bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
            <input id="st1-inp-waiting" type="text" inputmode="text" placeholder="Wait"
                   class="bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
            <div class="col-span-2">
                <input id="st1-inp-remarks" type="text" placeholder="Remarks"
                       class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-sm">
            </div>
        </div>
        <button onclick="updateStation(1)"
                class="w-full bg-emerald-600 active:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg">Push
            Station 01 Updates
        </button>
    </section>

    <section class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-amber-400">Station 02</h2>
            <span class="text-[10px] text-green-500 font-mono">CONNECTED</span>
            <input id="st2-start-roll" type="number" value="13"
                   class="w-10 bg-slate-700 text-white text-[10px] rounded p-1 border border-slate-600 text-center">
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="col-span-2">
                <input id="st2-inp-ongoing" type="text" inputmode="text" placeholder="--"
                       class="w-full bg-slate-900 border border-slate-600 rounded-lg p-4 text-2xl font-black text-center">
            </div>
            <input id="st2-inp-next" type="text" inputmode="text" placeholder="Next"
                   class="bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
            <input id="st2-inp-waiting" type="text" inputmode="text" placeholder="Wait"
                   class="bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
        </div>
        <button onclick="updateStation(2)"
                class="w-full bg-emerald-600 active:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg">Push
            Station 02 Updates
        </button>
    </section>

    <section class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-amber-400">Station 03</h2>
            <span class="text-[10px] text-green-500 font-mono">CONNECTED</span>
            <input id="st3-start-roll" type="number" value="25"
                   class="w-10 bg-slate-700 text-white text-[10px] rounded p-1 border border-slate-600 text-center">
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="col-span-2">
                <input id="st3-inp-ongoing" type="text" inputmode="text" placeholder="--"
                       class="w-full bg-slate-900 border border-slate-600 rounded-lg p-4 text-2xl font-black text-center">
            </div>
            <input id="st3-inp-next" type="text" inputmode="text" placeholder="Next"
                   class="bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
            <input id="st3-inp-waiting" type="text" inputmode="text" placeholder="Wait"
                   class="bg-slate-900 border border-slate-600 rounded-lg p-2 text-center font-bold">
        </div>
        <button onclick="updateStation(3)"
                class="w-full bg-emerald-600 active:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg">Push
            Station 03 Updates
        </button>
    </section>

    <section class="flex justify-center">
        <button onclick="resetStation()"
                class="px-8 bg-red-700 active:bg-red-800 text-white font-bold py-4 rounded-xl shadow-xl uppercase tracking-widest text-xs">
            Master Reset All Data
        </button>
    </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-700 p-2 flex justify-around text-[10px] text-slate-500">
    <div class="flex flex-col items-center text-indigo-400"><span>📱</span><span>Admin</span></div>
    <div class="flex flex-col items-center" onclick="window.location.href='display.html'"><span>📺</span><span>View Display</span>
    </div>
</nav>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</body>
<script>
    // 1. INITIALIZE FIREBASE FIRST (Crucial: This must be at the top)
    const firebaseConfig = {
        apiKey: "AIzaSyAeodb0vREvOcd-683q-E7OWVfRFyvVK7s",
        authDomain: "vivavocemanager.firebaseapp.com",
        databaseURL: "https://vivavocemanager-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "vivavocemanager",
        storageBucket: "vivavocemanager.firebasestorage.app",
        messagingSenderId: "609230399343",
        appId: "1:609230399343:web:1525d72e5ab418cfb6ea9a"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // 2. DEFINE SECURITY VARIABLES
    const lockOverlay = document.getElementById('admin-lock-overlay');
    const statusText = document.getElementById('lock-status');
    const qrImg = document.getElementById('access-qr');
    const tokenDisplay = document.getElementById('display-token');
    const qrSection = document.getElementById('qr-section');

    // 3. SECURITY LOGIC FUNCTIONS
    let localToken = localStorage.getItem('viva_access_token');

    function checkSessionAccess() {
        const adminRef = db.ref('admin_session');

        adminRef.on('value', (snapshot) => {
            const serverToken = snapshot.val();

            if (!serverToken) {
                // No one has claimed it, current user claims it automatically
                const newToken = Math.floor(100000 + Math.random() * 900000).toString();
                adminRef.set(newToken);
                localStorage.setItem('viva_access_token', newToken);
                localToken = newToken;
                unlockAdmin();
            }
            else if (serverToken === localToken) {
                // Authorized
                unlockAdmin();
                showAccessQR(serverToken);
            }
            else {
                // Not Authorized - Show the lock
                lockAdmin();
            }
        });
    }

    function verifyManualCode() {
        const enteredCode = document.getElementById('inp-access-code').value.trim();
        if (enteredCode.length !== 6) {
            alert("Please enter a valid 6-digit code.");
            return;
        }

        db.ref('admin_session').once('value', (snapshot) => {
            const serverToken = snapshot.val();
            if (enteredCode === serverToken) {
                localStorage.setItem('viva_access_token', enteredCode);
                alert("Access Granted! Syncing...");
                location.reload();
            } else {
                alert("Invalid Code. Check the projector screen.");
                document.getElementById('inp-access-code').value = "";
            }
        });
    }

    function unlockAdmin() {
        lockOverlay.style.display = 'none';
        db.ref('timer/showSetup').set(false);
    }

    function lockAdmin() { lockOverlay.style.display = 'flex'; }

    function showAccessQR(token) {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${token}`;
        qrImg.src = qrUrl;
        tokenDisplay.innerText = "CODE: " + token;
        qrSection.classList.remove('hidden');
    }

    // Start Security Check
    checkSessionAccess();

    // 4. ADMIN CONTROL FUNCTIONS
    function startTimer() {
        db.ref('timer').set({
            startTime: Date.now(),
            status: 'running',
            st1_base: parseInt(document.getElementById('st1-start-roll').value) || 1,
            st2_base: parseInt(document.getElementById('st2-start-roll').value) || 13,
            st3_base: parseInt(document.getElementById('st3-start-roll').value) || 25,
            showSetup: false
        }).then(() => {
            document.getElementById('timer-status').innerText = "Timer Running";
        });
    }

    function stopTimer() {
        db.ref('timer').update({ startTime: 0, status: 'stopped' })
        .then(() => { document.getElementById('timer-status').innerText = "Timer Stopped"; });
    }

    function updateGlobal() {
        db.ref('global').set({
            announcement: document.getElementById('inp-announcement').value,
            comments: document.getElementById('inp-global-comments').value
        });
    }

    function updateStation(id) {
        db.ref('stations/st' + id).set({
            ongoing: document.getElementById(`st${id}-inp-ongoing`).value || "--",
            next: document.getElementById(`st${id}-inp-next`).value || "--",
            waiting: document.getElementById(`st${id}-inp-waiting`).value || "--",
            remarks: document.getElementById(`st${id}-inp-remarks`) ? document.getElementById(`st${id}-inp-remarks`).value : "Ready"
        }).then(() => alert("Station " + id + " Updated!"));
    }

    function resetStation() {
        if (confirm("MASTER RESET: Clear all Station data, Timer, and Admin Lock?")) {
            db.ref('admin_session').remove();
            localStorage.removeItem('viva_access_token');

            db.ref('timer/showSetup').set(true);

            db.ref('timer').set({
                startTime: 0,
                status: 'stopped',
                showSetup: true
            });

            const resetData = { ongoing: "--", next: "--", waiting: "--", remarks: "Ready" };
            [1, 2, 3].forEach(id => {
                db.ref('stations/st' + id).set(resetData);
                document.getElementById(`st${id}-inp-ongoing`).value = "";
                document.getElementById(`st${id}-inp-next`).value = "";
                document.getElementById(`st${id}-inp-waiting`).value = "";
            });

            alert("System Fully Reset!");
            location.reload();
        }
    }

    function testBell() {
        db.ref('timer/triggerBell').set(Date.now());
    }
</script>
</html>
